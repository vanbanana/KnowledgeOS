name: ci

on:
  push:
    branches: ["main", "master", "codex/**"]
  pull_request:

jobs:
  web:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --check
      - run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -r workers/parser/requirements.txt
      - run: python -m pytest workers/parser/tests

